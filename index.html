<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>小家</title>
  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
  <div id="app">

    <div id="chat-bg"></div>
    <div id="sidebar-mask"></div>

    <div id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">小家</div>
      </div>
      <div class="menu-list">
        <div class="menu-item" id="menu-theme"><span class="menu-icon">◐</span>主题</div>
        <div class="menu-item" id="menu-role"><span class="menu-icon">◎</span>角色</div>
        <div class="menu-item" id="menu-days"><span class="menu-icon">♡</span>相识</div>
      </div>
      <div class="session-label">会话</div>
      <div class="session-list" id="session-list"></div>
      <div class="sidebar-footer">
        <div id="sidebar-role">
          <img id="current-role-avatar">
          <div id="current-role-name"></div>
        </div>
        <button class="topbar-btn" id="settings-btn">⚙︎</button>
      </div>
    </div>

    <div id="main">
      <div id="topbar">
        <div id="topbar-left">
          <button class="topbar-btn" id="menu-btn">☰</button>
          <div id="topbar-title"></div>
        </div>
        <button class="topbar-btn" id="new-session-btn">＋</button>
      </div>

      <div id="chat-area"></div>

      <div id="export-txt-bar">
        <button class="btn" id="export-txt-confirm">导出选中</button>
        <button class="btn secondary" id="export-txt-cancel">取消</button>
      </div>

      <div id="input-area">
        <div id="attach-preview"></div>
        <div id="input-box">
          <textarea id="input-text" rows="1" placeholder="说点什么..."></textarea>
          <div class="input-toolbar">
            <button id="attach-btn">＋</button>
            <input type="file" id="attach-input" accept="image/*" style="display:none">
            <button id="model-btn">选择模型</button>
            <button id="send-btn">↑</button>
          </div>
        </div>
      </div>
    </div>

    <div id="model-popup"></div>
  </div>
  <!-- 主题面板：内容由JS现场搭建 -->
  <div class="panel" id="theme-panel">
    <div class="panel-header">
      <button class="topbar-btn" id="theme-back">‹</button>
      <div class="panel-title">主题</div>
    </div>
    <div id="theme-body"></div>
  </div>

  <!-- 角色面板 -->
  <div class="panel" id="role-panel">
    <div class="panel-header">
      <button class="topbar-btn" id="role-back">‹</button>
      <div class="panel-title">角色</div>
    </div>
    <div class="settings-section">
      <div class="section-title">人设、会话、记忆完全隔离</div>
      <div id="role-page-list"></div>
      <button class="btn secondary" id="new-role-btn">＋ 新建角色</button>
    </div>
  </div>

  <!-- 相识面板 -->
  <div class="panel" id="days-panel">
    <div class="panel-header">
      <button class="topbar-btn" id="days-back">‹</button>
      <div class="panel-title">相识</div>
    </div>
    <div id="days-page-body">
      <div class="days-label">我们在一起</div>
      <div class="days-num" id="days-num"></div>
      <div class="days-unit">天</div>
      <div class="days-date" id="days-date"></div>
    </div>
  </div>

  <!-- 设置面板 -->
  <div class="panel" id="settings-panel">
    <div class="panel-header">
      <button class="topbar-btn" id="settings-back">‹</button>
      <div class="panel-title">设置</div>
    </div>

    <div class="settings-section">
      <div class="section-title">供应商（点击切换，⋯管理）</div>
      <div id="provider-list"></div>
      <button class="btn secondary" id="new-provider-btn">＋ 新增供应商</button>
      <div class="form-row" style="margin-top:14px">
        <label class="form-label">接口地址 baseURL（以 /v1 结尾）</label>
        <input class="form-input" type="text" id="set-baseurl" placeholder="https://xxx.com/v1">
      </div>
      <div class="form-row">
        <label class="form-label">API Key（只存在本机）</label>
        <input class="form-input" type="password" id="set-apikey" placeholder="sk-...">
      </div>
      <div class="btn-group">
        <button class="btn secondary" id="fetch-models-btn">拉取模型列表</button>
      </div>
      <div class="form-row" style="margin-top:12px">
        <label class="form-label">当前模型</label>
        <select class="form-select" id="set-model"></select>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-title">参数</div>
      <div id="param-body"></div>
    </div>

    <div class="settings-section">
      <div class="section-title">分段发送（AI回复拆成多条连发）</div>
      <div id="split-body"></div>
    </div>

    <div class="settings-section">
      <div class="section-title">当前角色</div>
      <div class="form-row">
        <label class="form-label">AI 昵称</label>
        <input class="form-input" type="text" id="set-ainame">
      </div>
      <div class="form-row">
        <label class="form-label">我的昵称</label>
        <input class="form-input" type="text" id="set-username">
      </div>
      <div class="form-row">
        <label class="form-label">人设提示词 system prompt</label>
        <textarea class="form-textarea" id="set-sysprompt" placeholder="在这里写人设..."></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">AI 头像</label>
        <div class="avatar-upload">
          <img class="avatar-preview" id="preview-ai-avatar">
          <input type="file" id="upload-ai-avatar" accept="image/*">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">我的头像</label>
        <div class="avatar-upload">
          <img class="avatar-preview" id="preview-user-avatar">
          <input type="file" id="upload-user-avatar" accept="image/*">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">聊天背景图</label>
        <input type="file" id="upload-bg" accept="image/*">
        <button class="btn secondary" id="remove-bg-btn" style="margin-top:8px">移除背景图</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-title">记忆系统（勾选的才会注入对话）</div>
      <div id="memory-list"></div>
      <button class="btn secondary" id="new-memory-btn">＋ 新增记忆</button>
    </div>

    <div class="settings-section">
      <div class="section-title">数据</div>
      <div class="btn-group">
        <button class="btn secondary" id="export-json-btn">导出JSON备份</button>
        <label class="btn secondary" style="display:inline-block">
          导入JSON<input type="file" id="import-json-input" accept=".json" style="display:none">
        </label>
        <button class="btn secondary" id="export-txt-btn">勾选导出TXT</button>
      </div>
    </div>

    <div style="padding:16px 16px 40px">
      <button class="btn" id="save-settings-btn" style="width:100%">保存设置</button>
    </div>
  </div>

  <div id="toast"></div>
<script>
window.onerror = function (msg, src, line, col) {
  alert("病灶：" + msg + " 第" + line + "行");
  return false;
};
window.addEventListener("unhandledrejection", function (e) {
  var r = e.reason;
  alert("暗伤：" + (r && r.message? r.message + " " + (r.stack || "").slice(0, 150) : r));
});
window.addEventListener("error", function (e) {
  if (e.target && e.target.tagName === "SCRIPT") {
    alert("app.js没加载到");
  }
}, true);
</script>



  <script src="app.js?v=18"></script>
</body>
</html>
