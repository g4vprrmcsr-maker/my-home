<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chat">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Chat</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --bg-blur: 12px; --bubble-blur: 8px; }
body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif; height:100vh; height:100dvh; overflow:hidden; background:#000; position:relative; }
body::before { content:''; position:fixed; inset:0; background-size:cover; background-position:center; background-repeat:no-repeat; z-index:0; }

/* Sidebar */
.sidebar { position:fixed; left:0; top:0; bottom:0; width:280px; background:rgba(30,30,30,0.85); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); z-index:100; transform:translateX(-100%); transition:transform 0.3s ease; display:flex; flex-direction:column; }
.sidebar.open { transform:translateX(0); }
.sidebar-header { padding:60px 16px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.08); }
.sidebar-header h2 { color:#fff; font-size:15px; font-weight:600; }
.sidebar-close { width:32px; height:32px; border:none; background:none; color:#aaa; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:8px; }
.sidebar-close:active { background:rgba(255,255,255,0.1); }
.sidebar-list { flex:1; overflow-y:auto; padding:8px; }
.sidebar-item { padding:12px; border-radius:10px; color:#e0e0e0; font-size:14px; cursor:pointer; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:background 0.15s; }
.sidebar-item:active, .sidebar-item.active { background:rgba(255,255,255,0.1); }
.sidebar-footer { padding:12px 16px; border-top:1px solid rgba(255,255,255,0.08); }
.sidebar-settings-btn { width:100%; padding:12px; border:none; background:rgba(255,255,255,0.06); color:#e0e0e0; font-size:14px; border-radius:10px; cursor:pointer; display:flex; align-items:center; gap:8px; }
.sidebar-settings-btn:active { background:rgba(255,255,255,0.12); }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:99; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.overlay.show { opacity:1; pointer-events:auto; }

/* Top bar */
.topbar { position:fixed; top:0; left:0; right:0; height:env(safe-area-inset-top,0px); min-height:52px; padding-top:env(safe-area-inset-top,0px); background:rgba(255,255,255,0.72); backdrop-filter:blur(var(--bg-blur)); -webkit-backdrop-filter:blur(var(--bg-blur)); border-bottom:1px solid rgba(0,0,0,0.06); display:flex; align-items:center; padding-left:16px; padding-right:16px; z-index:50; }
.topbar-left { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
.topbar-menu { width:36px; height:36px; border:none; background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:8px; }
.topbar-menu:active { background:rgba(0,0,0,0.05); }
.topbar-menu svg { width:22px; height:22px; stroke:#333; stroke-width:1.8; fill:none; }
.topbar-title { font-size:15px; font-weight:600; color:#1a1a1a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.topbar-right { display:flex; align-items:center; }
.topbar-new { width:36px; height:36px; border:none; background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:8px; }
.topbar-new:active { background:rgba(0,0,0,0.05); }
.topbar-new svg { width:22px; height:22px; stroke:#333; stroke-width:1.8; fill:none; }

/* Chat area */
.chat-wrap { position:fixed; top:52px; bottom:60px; left:0; right:0; padding-top:env(safe-area-inset-top,0px); overflow-y:auto; z-index:1; padding:16px 12px; }
.chat-wrap::-webkit-scrollbar { display:none; }

/* Messages */
.msg-row { display:flex; margin-bottom:14px; align-items:flex-start; gap:8px; }
.msg-row.user { flex-direction:row-reverse; }
.msg-avatar { width:34px; height:34px; border-radius:50%; object-fit:cover; flex-shrink:0; background:rgba(200,200,200,0.3); }
.msg-content { max-width:72%; display:flex; flex-direction:column; }
.msg-row.user .msg-content { align-items:flex-end; }
.msg-name { font-size:11px; color:rgba(80,80,80,0.7); margin-bottom:3px; padding:0 4px; }
.msg-bubble { padding:10px 14px; border-radius:18px; font-size:15px; line-height:1.5; color:#1a1a1a; background:rgba(255,255,255,0.55); backdrop-filter:blur(var(--bubble-blur)); -webkit-backdrop-filter:blur(var(--bubble-blur)); border:1px solid rgba(255,255,255,0.5); box-shadow:0 2px 12px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.6); word-break:break-word; }
.msg-row.user .msg-bubble { background:rgba(59,130,246,0.45); backdrop-filter:blur(var(--bubble-blur)); -webkit-backdrop-filter:blur(var(--bubble-blur)); border:1px solid rgba(59,130,246,0.3); color:#fff; box-shadow:0 2px 12px rgba(59,130,246,0.1), inset 0 1px 0 rgba(255,255,255,0.2); }
.msg-meta { font-size:10px; color:rgba(100,100,100,0.6); margin-top:3px; padding:0 4px; }
.msg-row.user .msg-meta { text-align:right; }

/* Bottom bar */
.bottombar { position:fixed; bottom:0; left:0; right:0; padding:8px 12px; padding-bottom:max(8px, env(safe-area-inset-bottom)); background:rgba(255,255,255,0.72); backdrop-filter:blur(var(--bg-blur)); -webkit-backdrop-filter:blur(var(--bg-blur)); border-top:1px solid rgba(0,0,0,0.06); z-index:50; }
.input-row { display:flex; align-items:flex-end; gap:8px; }
.input-box { flex:1; min-height:38px; max-height:120px; padding:9px 14px; border-radius:20px; border:1px solid rgba(0,0,0,0.1); background:rgba(255,255,255,0.6); font-size:15px; line-height:1.4; color:#1a1a1a; outline:none; resize:none; overflow-y:auto; }
.input-box:focus { border-color:rgba(59,130,246,0.4); }
.input-box::placeholder { color:#999; }
.send-btn { width:36px; height:36px; border:none; border-radius:50%; background:rgba(59,130,246,0.8); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s; }
.send-btn:active { background:rgba(59,130,246,1); }
.send-btn svg { width:18px; height:18px; fill:#fff; }
.input-tools { display:flex; align-items:center; gap:6px; padding:6px 4px 0; }
.tool-btn { padding:4px 10px; border:none; background:rgba(0,0,0,0.04); color:#666; font-size:12px; border-radius:14px; cursor:pointer; }
.tool-btn:active { background:rgba(0,0,0,0.08); }
.model-select { padding:4px 10px; border:1px solid rgba(0,0,0,0.08); background:rgba(255,255,255,0.6); color:#555; font-size:12px; border-radius:14px; outline:none; cursor:pointer; -webkit-appearance:none; }

/* Memory panel */
.memory-panel { position:fixed; bottom:70px; left:12px; right:12px; max-height:200px; background:rgba(255,255,255,0.9); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-radius:16px; border:1px solid rgba(0,0,0,0.06); padding:12px; overflow-y:auto; z-index:60; display:none; box-shadow:0 8px 32px rgba(0,0,0,0.1); }
.memory-panel.show { display:block; }
.memory-panel h4 { font-size:13px; color:#333; margin-bottom:8px; }
.memory-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid rgba(0,0,0,0.04); }
.memory-item:last-child { border-bottom:none; }
.memory-item input[type=checkbox] { width:16px; height:16px; accent-color:#3b82f6; }
.memory-item span { font-size:13px; color:#444; flex:1; }
.memory-item .mem-del { width:20px; height:20px; border:none; background:none; color:#ccc; font-size:16px; cursor:pointer; }

/* Settings page */
.settings-page { position:fixed; inset:0; background:rgba(245,245,247,0.97); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); z-index:200; transform:translateX(100%); transition:transform 0.3s ease; overflow-y:auto; padding:60px 16px 40px; }
.settings-page.open { transform:translateX(0); }
.settings-back { position:fixed; top:16px; left:16px; z-index:201; width:36px; height:36px; border:none; background:rgba(0,0,0,0.05); border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.settings-back:active { background:rgba(0,0,0,0.1); }
.settings-back svg { width:20px; height:20px; stroke:#333; stroke-width:2; fill:none; }
.settings-section { margin-bottom:24px; }
.settings-section h3 { font-size:13px; color:#888; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; padding-left:4px; }
.settings-card { background:rgba(255,255,255,0.8); border-radius:14px; padding:14px; border:1px solid rgba(0,0,0,0.04); }
.settings-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(0,0,0,0.04); }
.settings-row:last-child { border-bottom:none; }
.settings-row label { font-size:14px; color:#333; }
.settings-row input[type=text], .settings-row input[type=password], .settings-row textarea { width:60%; padding:8px 10px; border:1px solid rgba(0,0,0,0.08); border-radius:10px; font-size:13px; background:rgba(255,255,255,0.8); outline:none; }
.settings-row textarea { height:80px; resize:vertical; width:100%; margin-top:8px; }
.settings-row-full { padding:10px 0; }
.settings-row-full label { font-size:14px; color:#333; display:block; margin-bottom:6px; }
.upload-btn { padding:8px 16px; border:1px solid rgba(0,0,0,0.1); background:rgba(255,255,255,0.6); border-radius:10px; font-size:13px; color:#555; cursor:pointer; }
.upload-btn:active { background:rgba(0,0,0,0.05); }
.avatar-preview { width:40px; height:40px; border-radius:50%; object-fit:cover; border:1px solid rgba(0,0,0,0.08); }
.memory-manage { margin-top:8px; }
.memory-add-row { display:flex; gap:8px; margin-bottom:8px; }
.memory-add-row input { flex:1; padding:8px 10px; border:1px solid rgba(0,0,0,0.08); border-radius:10px; font-size:13px; outline:none; }
.memory-add-row button { padding:8px 14px; border:none; background:rgba(59,130,246,0.8); color:#fff; border-radius:10px; font-size:13px; cursor:pointer; }
.memory-list-settings { max-height:150px; overflow-y:auto; }
.memory-list-settings .mem-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid rgba(0,0,0,0.04); font-size:13px; color:#444; }
.memory-list-settings .mem-item:last-child { border-bottom:none; }
.memory-list-settings .mem-item button { border:none; background:none; color:#e55; font-size:14px; cursor:pointer; margin-left:auto; }
</style>
</head>
<body>
<!-- Sidebar -->
<div class="overlay" id="overlay"></div>
<div class="sidebar" id="sidebar">
<div class="sidebar-header">
<h2>会话</h2>

</div>
<div class="sidebar-list" id="sidebarList"></div>
<div class="sidebar-footer">
<button class="sidebar-settings-btn" id="openSettings">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
设置
</button>
</div>
</div>

<!-- Top bar -->
<div class="topbar">
<div class="topbar-left">
<button class="topbar-menu" id="menuBtn">
<svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

</div>

</button>

<!-- Chat area -->

<!-- Memory panel -->
<div class="memory-panel" id="memoryPanel">

<div id="memoryCheckList"></div>
</div>

<!-- Bottom bar -->
<div class="bottombar">
<div class="input-tools">
<button class="tool-btn" id="memoryToggle">记忆</button>
<select class="model-select" id="modelSelect">
<option value="claude-sonnet-4-20250514">claude-sonnet-4</option>
<option value="claude-3-5-sonnet-20241022">claude-3.5-sonnet</option>
<option value="claude-3-opus-20240229">claude-3-opus</option>
<option value="gpt-4o">gpt-4o</option>
<option value="gpt-4o-mini">gpt-4o-mini</option>

<div class="input-row">

<button class="send-btn" id="sendBtn">
<svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
</button>

</div>

<h3>个人信息</h3>
<div class="settings-card">
<div class="settings-row">

</div>

<input type="text" id="aiName" placeholder="AI的名字">

<label>对方头像</label>

<h3>聊天背景</h3>

<div class="settings-row">

</div>

<input type="text" id="memoryInput" placeholder="添加一条记忆...">

<script>
// === State ===
let state = {
  chats: [],
  activeChatId: null,
  settings: {
    apiUrl: '',
    apiKey: '',
    systemPrompt: '',
    userName: '我',
    aiName: 'AI',
    userAvatar: '',
    aiAvatar: '',
    bgImage: '',
    memories: [],
    selectedModel: 'claude-sonnet-4-20250514'
  }
};

// === Init ===
function init() {
  loadState();
  applySettings();
  renderSidebar();
  if (!state.activeChatId || !getActiveChat()) {
    newChat();
  } else {
    renderChat();
    updateTopTitle();
  }
  bindEvents();
}

// === Storage ===
function saveState() {
  localStorage.setItem('chatApp', JSON.stringify(state));
}
function loadState() {
  const saved = localStorage.getItem('chatApp');
  if (saved) {
    const parsed = JSON.parse(saved);
    state = { ...state, ...parsed, settings: { ...state.settings, ...parsed.settings } };
  }
}

// === Chat management ===
function getActiveChat() {
  return state.chats.find(c => c.id === state.activeChatId);
}
function newChat() {
  const chat = { id: Date.now().toString(), title: '新对话', messages: [] };
  state.chats.unshift(chat);
  state.activeChatId = chat.id;
  saveState();
  renderSidebar();
  renderChat();
  updateTopTitle();
  closeSidebar();
}
function switchChat(id) {
  state.activeChatId = id;
  saveState();
  renderChat();
  updateTopTitle();
  closeSidebar();
}
function deleteChat(id) {
  state.chats = state.chats.filter(c => c.id !== id);
  if (state.activeChatId === id) {
    if (state.chats.length > 0) {
      state.activeChatId = state.chats[0].id;
    } else {
      newChat();
      return;
    }
  }
  saveState();
  renderSidebar();
  renderChat();
  updateTopTitle();
}
function updateTopTitle() {
  document.getElementById('topTitle').textContent = getActiveChat()?.title || '新对话';
}
function generateTitle(msg) {
  return msg.length > 20 ? msg.substring(0, 20) + '...' : msg;
}

// === Render ===
function renderSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = state.chats.map(c => `
    <div class="sidebar-item ${c.id === state.activeChatId ? 'active' : ''}" data-id="${c.id}">
      ${c.title}
    </div>
  `).join('');
  list.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => switchChat(el.dataset.id));
    el.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (confirm('删除这个会话？')) deleteChat(el.dataset.id);
    });
  });
}

function renderChat() {
  const chat = getActiveChat();
  const wrap = document.getElementById('chatWrap');
  if (!chat || chat.messages.length === 0) {
    wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = chat.messages.map(m => {
    const isUser = m.role === 'user';
    const avatar = isUser ? (state.settings.userAvatar || '') : (state.settings.aiAvatar || '');
    const name = isUser ? state.settings.userName : state.settings.aiName;
    const avatarHtml = avatar ? `<img class="msg-avatar" src="${avatar}">` : `<div class="msg-avatar"></div>`;
    return `
      <div class="msg-row ${isUser ? 'user' : ''}">
        ${avatarHtml}
        <div class="msg-content">
          <div class="msg-name">${name}</div>
          <div class="msg-bubble">${formatMsg(m.content)}</div>
          <div class="msg-meta">${m.time || ''}${m.tokens ? ' · ' + m.tokens + ' tokens' : ''}</div>
        </div>
      </div>
    `;
  }).join('');
  wrap.scrollTop = wrap.scrollHeight;
}

function formatMsg(text) {
  return text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

// === Send message ===
async function sendMessage() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text) return;

  const chat = getActiveChat();
  if (!chat) return;

  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  chat.messages.push({ role: 'user', content: text, time: timeStr });

  if (chat.messages.length === 1) {
    chat.title = generateTitle(text);
    renderSidebar();
    updateTopTitle();
  }

  input.value = '';
  input.style.height = 'auto';
  renderChat();

  // Build API messages
  const apiMessages = [];
  
  // System prompt + selected memories
  let sysContent = state.settings.systemPrompt || '';
  const selectedMemories = getSelectedMemories();
  if (selectedMemories.length > 0) {
    sysContent += (sysContent ? '\n\n' : '') + '记忆信息：\n' + selectedMemories.join('\n');
  }
  if (sysContent) {
    apiMessages.push({ role: 'system', content: sysContent });
  }

  // Chat history
  chat.messages.forEach(m => {
    apiMessages.push({ role: m.role, content: m.content });
  });

  // Call API
  try {
    const response = await callAPI(apiMessages);
    const aiTime = new Date();
    const aiTimeStr = aiTime.getHours().toString().padStart(2,'0') + ':' + aiTime.getMinutes().toString().padStart(2,'0');
    
    chat.messages.push({ 
      role: 'assistant', 
      content: response.content, 
      time: aiTimeStr,
      tokens: response.tokens || null
    });
    saveState();
    renderChat();
  } catch (err) {
    chat.messages.push({ 
      role: 'assistant', 
      content: '请求失败: ' + err.message, 
      time: timeStr 
    });
    saveState();
    renderChat();
  }
}

async function callAPI(messages) {
  const url = state.settings.apiUrl;
  const key = state.settings.apiKey;
  const model = document.getElementById('modelSelect').value;

  if (!url || !key) throw new Error('请先在设置中配置API地址和Key');

  const res = await fetch(url + '/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + key
    },
    body: JSON.stringify({
      model: model,
      messages: messages,
      stream: false
    })
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(res.status + ' ' + errText.substring(0, 100));
  }

  const data = await res.json();
  const content = data.choices?.[0]?.message?.content || '(空回复)';
  const tokens = data.usage ? (data.usage.prompt_tokens + data.usage.completion_tokens) : null;
  return { content, tokens };
}

// === Memory ===
function getSelectedMemories() {
  const checks = document.querySelectorAll('#memoryCheckList input[type=checkbox]:checked');
  return Array.from(checks).map(c => c.dataset.text);
}

function renderMemoryPanel() {
  const list = document.getElementById('memoryCheckList');
  list.innerHTML = state.settings.memories.map((m, i) => `
    <div class="memory-item">
      <input type="checkbox" data-text="${m}" checked>
      <span>${m}</span>
    </div>
  `).join('');
}

function renderMemorySettings() {
  const list = document.getElementById('memoryListSettings');
  list.innerHTML = state.settings.memories.map((m, i) => `
    <div class="mem-item">
      <span>${m}</span>
      <button data-idx="${i}">✕</button>
    </div>
  `).join('');
  list.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.settings.memories.splice(parseInt(btn.dataset.idx), 1);
      saveState();
      renderMemorySettings();
      renderMemoryPanel();
    });
  });
}

// === Settings ===
function applySettings() {
  // Background
  if (state.settings.bgImage) {
    document.body.style.setProperty('--bg-img', `url(${state.settings.bgImage})`);
    document.querySelector('body').style.background = 'none';
    document.querySelector('body::before')?.remove;
    document.body.style.backgroundImage = `url(${state.settings.bgImage})`;
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';
  } else {
    document.body.style.backgroundImage = 'none';
    document.body.style.background = '#f5f5f7';
  }

  // Load settings into form
  document.getElementById('apiUrl').value = state.settings.apiUrl || '';
  document.getElementById('apiKey').value = state.settings.apiKey || '';
  document.getElementById('systemPrompt').value = state.settings.systemPrompt || '';
  document.getElementById('userName').value = state.settings.userName || '';
  document.getElementById('aiName').value = state.settings.aiName || '';
  document.getElementById('modelSelect').value = state.settings.selectedModel || 'claude-sonnet-4-20250514';

  if (state.settings.userAvatar) {
    document.getElementById('userAvatarPreview').src = state.settings.userAvatar;
  }
  if (state.settings.aiAvatar) {
    document.getElementById('aiAvatarPreview').src = state.settings.aiAvatar;
  }

  renderMemorySettings();
  renderMemoryPanel();
}

function saveSettings() {
  state.settings.apiUrl = document.getElementById('apiUrl').value.trim();
  state.settings.apiKey = document.getElementById('apiKey').value.trim();
  state.settings.systemPrompt = document.getElementById('systemPrompt').value;
  state.settings.userName = document.getElementById('userName').value.trim() || '我';
  state.settings.aiName = document.getElementById('aiName').value.trim() || 'AI';
  state.settings.selectedModel = document.getElementById('modelSelect').value;
  saveState();
  applySettings();
  renderChat();
}

// === Sidebar ===
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// === Events ===
function bindEvents() {
  document.getElementById('menuBtn').addEventListener('click', openSidebar);
  document.getElementById('sidebarClose').addEventListener('click', closeSidebar);
  document.getElementById('overlay').addEventListener('click', closeSidebar);
  document.getElementById('newChatBtn').addEventListener('click', newChat);

  // Settings
  document.getElementById('openSettings').addEventListener('click', () => {
    document.getElementById('settingsPage').classList.add('open');
    closeSidebar();
  });
  document.getElementById('settingsBack').addEventListener('click', () => {
    saveSettings();
    document.getElementById('settingsPage').classList.remove('open');
  });

  // Send
  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('inputBox').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto resize textarea
  document.getElementById('inputBox').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // Memory toggle
  document.getElementById('memoryToggle').addEventListener('click', () => {
    document.getElementById('memoryPanel').classList.toggle('show');
  });

  // Avatar uploads
  document.getElementById('userAvatarInput').addEventListener('change', function() {
    handleImageUpload(this, (data) => {
      state.settings.userAvatar = data;
      document.getElementById('userAvatarPreview').src = data;
      saveState();
    });
  });
  document.getElementById('aiAvatarInput').addEventListener('change', function() {
    handleImageUpload(this, (data) => {
      state.settings.aiAvatar = data;
      document.getElementById('aiAvatarPreview').src = data;
      saveState();
    });
  });

  // Background upload
  document.getElementById('bgInput').addEventListener('change', function() {
    handleImageUpload(this, (data) => {
      state.settings.bgImage = data;
      saveState();
      applySettings();
    });
  });
  document.getElementById('bgClear').addEventListener('click', () => {
    state.settings.bgImage = '';
    saveState();
    applySettings();
  });

  // Memory add
  document.getElementById('memoryAddBtn').addEventListener('click', () => {
    const input = document.getElementById('memoryInput');
    const text = input.value.trim();
    if (text) {
      state.settings.memories.push(text);
      input.value = '';
      saveState();
      renderMemorySettings();
      renderMemoryPanel();
    }
  });

  // Model change
  document.getElementById('modelSelect').addEventListener('change', function() {
    state.settings.selectedModel = this.value;
    saveState();
  });

  // Click outside memory panel to close
  document.getElementById('chatWrap').addEventListener('click', () => {
    document.getElementById('memoryPanel').classList.remove('show');
  });
}

// === Utils ===
function handleImageUpload(input, callback) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => callback(e.target.result);
  reader.readAsDataURL(file);
}

// === Start ===
init();
</script>
