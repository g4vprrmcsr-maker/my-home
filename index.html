<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --glass-bg:rgba(255,255,255,0.55);
  --glass-border:rgba(255,255,255,0.8);
  --glass-shadow:0 2px 16px rgba(0,0,0,0.04);
  --bubble-ai:rgba(255,255,255,0.65);
  --bubble-user:rgba(220,215,255,0.45);
  --text:#1a1a1a;
  --sub:#999;
  --radius:22px;
}

body{
  min-height:100vh;
  min-height:100dvh;
  background:#ffffff;
  font-family:-apple-system,'PingFang SC','SF Pro Display','Helvetica Neue',sans-serif;
  color:var(--text);
  overflow:hidden;
}

.app{
  width:100%;max-width:500px;
  height:100vh;height:100dvh;
  margin:0 auto;
  display:flex;flex-direction:column;
  position:relative;
  background-size:cover;
  background-position:center;
}

/* 顶部栏 */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;
  padding-top:max(16px, env(safe-area-inset-top));
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:0.5px solid rgba(0,0,0,0.06);
  z-index:10;
}
.header-title{
  font-size:16px;font-weight:600;
  letter-spacing:-0.3px;
}
.header-btn{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  background:rgba(0,0,0,0.04);
  border:none;cursor:pointer;
  font-size:18px;
  transition:background 0.2s;
}
.header-btn:active{background:rgba(0,0,0,0.1);}

/* 聊天区域 */
.chat-wrap{
  flex:1;overflow-y:auto;
  padding:16px 16px 8px 16px;
  display:flex;flex-direction:column;
  gap:20px;
  -webkit-overflow-scrolling:touch;
}
.chat-wrap::-webkit-scrollbar{display:none;}

/* 消息 */
.msg{display:flex;gap:10px;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}

.msg-avatar{
  width:34px;height:34px;
  border-radius:50%;
  flex-shrink:0;
  overflow:hidden;
  background:var(--glass-bg);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}

.msg-body{max-width:75%;display:flex;flex-direction:column;gap:4px;}
.msg.user .msg-body{align-items:flex-end;}

.msg-name{
  font-size:11px;color:var(--sub);
  padding:0 4px;
  display:flex;align-items:center;gap:6px;
}
.msg-time{font-size:10px;color:#bbb;}

.bubble{
  padding:12px 16px;
  font-size:14px;line-height:1.7;
  word-break:break-word;
  white-space:pre-wrap;
  position:relative;
  border-radius:var(--radius);
  box-shadow:
    0 2px 12px rgba(0,0,0,0.03),
    inset 0 1px 0 rgba(255,255,255,0.9),
    inset 0 -1px 2px rgba(0,0,0,0.02);
}
.msg.ai .bubble{
  background:var(--bubble-ai);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:0.5px solid rgba(255,255,255,0.85);
  border-bottom-left-radius:6px;
}
.msg.user .bubble{
  background:var(--bubble-user);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:0.5px solid rgba(200,190,255,0.5);
  border-bottom-right-radius:6px;
}

.bubble-meta{
  font-size:10px;color:#ccc;
  text-align:right;
  padding:2px 4px 0 0;
  letter-spacing:0.3px;
}

/* 打字动画 */
.typing-dots{display:flex;gap:4px;padding:4px 0;}
.typing-dots span{
  width:5px;height:5px;
  background:rgba(0,0,0,0.2);
  border-radius:50%;
  animation:typeBounce 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.15s;}
.typing-dots span:nth-child(3){animation-delay:0.3s;}
@keyframes typeBounce{
  0%,60%,100%{transform:translateY(0);opacity:0.4;}
  30%{transform:translateY(-5px);opacity:1;}
}

/* 底部输入区 */
.input-bar{
  padding:10px 14px;
  padding-bottom:max(10px, env(safe-area-inset-bottom));
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:0.5px solid rgba(0,0,0,0.05);
  display:flex;align-items:flex-end;gap:8px;
}
.input-box{
  flex:1;
  background:rgba(255,255,255,0.6);
  border:0.5px solid rgba(0,0,0,0.08);
  border-radius:20px;
  padding:10px 16px;
  display:flex;align-items:flex-end;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.8);
}
.input-box textarea{
  flex:1;border:none;background:transparent;
  font-size:14px;color:var(--text);
  resize:none;outline:none;
  max-height:100px;
  font-family:inherit;line-height:1.5;
}
.input-actions{
  display:flex;align-items:center;gap:6px;
}
.act-btn{
  width:34px;height:34px;
  border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;
  background:rgba(0,0,0,0.04);
  transition:all 0.2s;
}
.act-btn:active{background:rgba(0,0,0,0.1);}
.send-btn{
  background:linear-gradient(135deg,rgba(140,120,255,0.7),rgba(100,160,255,0.7));
  color:#fff;font-size:14px;
  box-shadow:0 2px 8px rgba(140,120,255,0.2);
}
.send-btn:active{opacity:0.8;}

/* 模型选择器 */
.model-tag{
  font-size:11px;
  padding:4px 10px;
  border-radius:12px;
  background:rgba(0,0,0,0.04);
  color:var(--sub);
  cursor:pointer;
  border:0.5px solid rgba(0,0,0,0.06);
  white-space:nowrap;
  transition:background 0.2s;
}
.model-tag:active{background:rgba(0,0,0,0.08);}

/* 底部导航 */
.navbar{
  display:flex;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:0.5px solid rgba(0,0,0,0.06);
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-item{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:10px 0 6px 0;
  font-size:10px;color:#999;
  cursor:pointer;gap:3px;
  transition:color 0.2s;
}
.nav-item.active{color:#7c6cf0;}
.nav-icon{font-size:20px;}

/* 页面切换 */
.page{display:none;flex-direction:column;height:100%;}
.page.active{display:flex;}

/* 设置页面占位 */
.setting-scroll{
  flex:1;overflow-y:auto;
  padding:16px;
  -webkit-overflow-scrolling:touch;
}
.setting-scroll::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div class="app" id="app">

<!-- 聊天页 -->
<div class="page active" id="pageCh">
  <div class="header">
    <div class="header-title" id="chatTitle">新对话</div>
    <div style="display:flex;gap:8px;">
      <button class="header-btn" onclick="newChat()" title="新对话">＋</button>
      <button class="header-btn" onclick="switchPage('pageSet')" title="设置">⚙</button>
    </div>
  </div>

  <div class="chat-wrap" id="chatArea"></div>

  <div class="input-bar">
    <div class="model-tag" id="modelTag" onclick="showModelPicker()">选择模型</div>
    <div class="input-box">
      <textarea id="inputBox" placeholder="说点什么..." rows="1"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
    </div>
    <div class="input-actions">
      <button class="act-btn" onclick="pickImage()" title="发图片">🖼</button>
      <button class="act-btn send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<!-- 设置页 -->
<div class="page" id="pageSet">
  <div class="header">
    <div class="header-title">设置</div>
    <button class="header-btn" onclick="switchPage('pageCh')">✕</button>
  </div>

  <div class="setting-scroll">
    <div style="margin-bottom:20px;">
      <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:12px;">API 设置</div>
      <div style="background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid var(--glass-border);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--glass-shadow);">
        <div>
          <div style="font-size:11px;color:#aaa;margin-bottom:4px;">中转站地址</div>
          <input id="sApiUrl" type="text" placeholder="https://your-api.com/v1" style="width:100%;padding:10px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:13px;outline:none;font-family:inherit;">
        </div>
        <div>
          <div style="font-size:11px;color:#aaa;margin-bottom:4px;">API Key</div>
          <input id="sApiKey" type="password" placeholder="sk-..." style="width:100%;padding:10px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:13px;outline:none;font-family:inherit;">
        </div>
        <div>
          <div style="font-size:11px;color:#aaa;margin-bottom:4px;">模型</div>
          <div style="display:flex;gap:8px;">
            <select id="sModel" style="flex:1;padding:10px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:13px;outline:none;font-family:inherit;"></select>
            <button onclick="fetchModels()" style="padding:8px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;font-family:inherit;">拉取</button>
          </div>
        </div>
      </div>
    </div>

    <div style="margin-bottom:20px;">
      <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:12px;">个人信息</div>
      <div style="background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid var(--glass-border);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--glass-shadow);">
        <div>
          <div style="font-size:11px;color:#aaa;margin-bottom:4px;">我的昵称</div>
          <input id="sNickname" type="text" placeholder="你叫什么" style="width:100%;padding:10px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:13px;outline:none;font-family:inherit;">
        </div>
        <div>
          <div style="font-size:11px;color:#aaa;margin-bottom:4px;">AI昵称</div>
          <input id="sAiName" type="text" placeholder="AI叫什么" style="width:100%;padding:10px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:13px;outline:none;font-family:inherit;">
        </div>
        <div>
          <div style="font-size:11px;color:#aaa;margin-bottom:4px;">我的头像URL</div>
          <input id="sMyAvatar" type="text" placeholder="粘贴图片链接" style="width:100%;padding:10px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:13px;outline:none;font-family:inherit;">
        </div>
        <div>
          <div style="font-size:11px;color:#aaa;margin-bottom:4px;">AI头像URL</div>
          <input id="sAiAvatar" type="text" placeholder="粘贴图片链接" style="width:100%;padding:10px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:13px;outline:none;font-family:inherit;">
        </div>
        <div>
          <div style="font-size:11px;color:#aaa;margin-bottom:4px;">在一起的日期</div>
          <input id="sDate" type="date" style="width:100%;padding:10px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:13px;outline:none;font-family:inherit;">
        </div>
        <div>
          <div style="font-size:11px;color:#aaa;margin-bottom:4px;">聊天背景URL（可选）</div>
          <input id="sBg" type="text" placeholder="粘贴背景图链接" style="width:100%;padding:10px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:13px;outline:none;font-family:inherit;">
        </div>
      </div>
    </div>

    <div style="margin-bottom:20px;">
      <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:12px;">人设与记忆</div>
      <div style="background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid var(--glass-border);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--glass-shadow);">
        <div>
          <div style="font-size:11px;color:#aaa;margin-bottom:4px;">系统提示词（人设）</div>
          <textarea id="sSystem" placeholder="写AI的人设..." style="width:100%;padding:10px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:13px;outline:none;font-family:inherit;resize:none;height:120px;line-height:1.6;"></textarea>
        </div>
        <div>
          <div style="font-size:11px;color:#aaa;margin-bottom:4px;">记忆</div>
          <textarea id="sMemory" placeholder="粘贴记忆内容..." style="width:100%;padding:10px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:13px;outline:none;font-family:inherit;resize:none;height:120px;line-height:1.6;"></textarea>
        </div>
      </div>
    </div>

    <button onclick="saveSettings()" style="width:100%;padding:14px;border-radius:16px;border:none;background:linear-gradient(135deg,rgba(140,120,255,0.6),rgba(100,160,255,0.6));color:#fff;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;backdrop-filter:blur(10px);margin-bottom:30px;">保存设置</button>
  </div>
</div>

<!-- 底部导航 -->
<div class="navbar">
  <div class="nav-item active" onclick="switchPage('pageCh')">
    <span class="nav-icon">💬</span>
    <span>聊天</span>
  </div>
  <div class="nav-item" onclick="switchPage('pageSet')">
    <span class="nav-icon">⚙️</span>
    <span>设置</span>
  </div>
</div>

</div>

<input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImage(event)">
</body>
<script>
const $=id=>document.getElementById(id);
let messages=[];
let pendingImage=null;

function switchPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach((n,i)=>{
    n.classList.toggle('active', (i===0&&id==='pageCh')||(i===1&&id==='pageSet'));
  });
  if(id==='pageSet') loadForm();
}

function getS(){try{return JSON.parse(localStorage.getItem('chatcfg'))||{};}catch(e){return {};}}
function setS(o){localStorage.setItem('chatcfg',JSON.stringify(o));}

function loadForm(){
  const s=getS();
  $('sApiUrl').value=s.apiUrl||'';
  $('sApiKey').value=s.apiKey||'';
  $('sNickname').value=s.nickname||'';
  $('sAiName').value=s.aiName||'';
  $('sMyAvatar').value=s.myAvatar||'';
  $('sAiAvatar').value=s.aiAvatar||'';
  $('sDate').value=s.startDate||'';
  $('sBg').value=s.bg||'';
  $('sSystem').value=s.system||'';
  $('sMemory').value=s.memory||'';
  loadModelSelect(s.model);
}

function saveSettings(){
  const cfg={
    apiUrl:$('sApiUrl').value.trim(),
    apiKey:$('sApiKey').value.trim(),
    model:$('sModel').value,
    nickname:$('sNickname').value.trim(),
    aiName:$('sAiName').value.trim(),
    myAvatar:$('sMyAvatar').value.trim(),
    aiAvatar:$('sAiAvatar').value.trim(),
    startDate:$('sDate').value,
    bg:$('sBg').value.trim(),
    system:$('sSystem').value.trim(),
    memory:$('sMemory').value.trim()
  };
  const old=getS();
  cfg.models=old.models||[];
  setS(cfg);
  applyBg();
  updateModelTag();
  switchPage('pageCh');
}

function applyBg(){
  const s=getS();
  const app=$('app');
  if(s.bg){
    app.style.backgroundImage='url('+s.bg+')';
  } else {
    app.style.backgroundImage='none';
  }
}

function updateModelTag(){
  const s=getS();
  $('modelTag').textContent=s.model?s.model.split('/').pop():'选择模型';
}

async function fetchModels(){
  const url=$('sApiUrl').value.trim();
  const key=$('sApiKey').value.trim();
  if(!url||!key){alert('先填API地址和Key');return;}
  try{
    const res=await fetch(url+'/models',{headers:{'Authorization':'Bearer '+key}});
    const data=await res.json();
    let list=data.data||data;
    if(Array.isArray(list)){
      list=list.map(m=>m.id||m).sort();
      const s=getS();
      s.models=list;
      setS(s);
      loadModelSelect(s.model);
    }
  }catch(e){alert('拉取失败：'+e.message);}
}

function loadModelSelect(current){
  const s=getS();
  const sel=$('sModel');
  sel.innerHTML='';
  const models=s.models||[];
  if(models.length===0){
    sel.innerHTML='<option value="">先拉取模型</option>';
    return;
  }
  models.forEach(m=>{
    const o=document.createElement('option');
    o.value=m;o.textContent=m;
    if(m===current)o.selected=true;
    sel.appendChild(o);
  });
}

function showModelPicker(){
  const s=getS();
  const models=s.models||[];
  if(models.length===0){alert('先去设置里拉取模型');return;}
  const choice=prompt('输入模型名称或序号：\n\n'+models.map((m,i)=>(i+1)+'. '+m).join('\n'));
  if(!choice)return;
  let picked=choice.trim();
  const num=parseInt(picked);
  if(num>0&&num<=models.length)picked=models[num-1];
  if(models.includes(picked)){
    const cfg=getS();cfg.model=picked;setS(cfg);
    updateModelTag();
  }
}

function newChat(){
  messages=[];
  $('chatArea').innerHTML='';
  $('chatTitle').textContent='新对话';
}

function now(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function makeAvatar(type){
  const s=getS();
  const url=type==='ai'?s.aiAvatar:s.myAvatar;
  if(url) return '<div class="msg-avatar"><img src="'+url+'"></div>';
  const letter=type==='ai'?(s.aiName||'AI').charAt(0):(s.nickname||'我').charAt(0);
  return '<div class="msg-avatar" style="font-size:13px;color:#999;">'+letter+'</div>';
}

function appendMsg(role, text, tokens){
  const s=getS();
  const area=$('chatArea');
  const div=document.createElement('div');
  div.className='msg '+(role==='user'?'user':'ai');
  const name=role==='user'?(s.nickname||'我'):(s.aiName||'AI');
  const tokenStr=tokens?tokens+' tokens':'';
  div.innerHTML=makeAvatar(role==='user'?'user':'ai')+
    '<div class="msg-body">'+
      '<div class="msg-name"><span>'+name+'</span><span class="msg-time">'+now()+'</span></div>'+
      '<div class="bubble">'+text+'</div>'+
      (tokenStr?'<div class="bubble-meta">'+tokenStr+'</div>':'')+
    '</div>';
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

function appendTyping(){
  const area=$('chatArea');
  const div=document.createElement('div');
  div.className='msg ai';div.id='typingEl';
  div.innerHTML=makeAvatar('ai')+
    '<div class="msg-body"><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>';
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}
function removeTyping(){const el=$('typingEl');if(el)el.remove();}

function pickImage(){$('imgInput').click();}

function handleImage(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    pendingImage={base64:ev.target.result.split(',')[1], mediaType:file.type};
    appendMsg('user','[图片已选择，发送消息时一起发出]');
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

async function sendMsg(){
  const box=$('inputBox');
  const text=box.value.trim();
  if(!text&&!pendingImage)return;
  const s=getS();
  if(!s.apiKey||!s.apiUrl){alert('先去设置填API');return;}

  box.value='';box.style.height='auto';

  let userContent;
  if(pendingImage){
    appendMsg('user', text||'[图片]');
    userContent=[
      {type:'image_url', image_url:{url:'data:'+pendingImage.mediaType+';base64,'+pendingImage.base64}},
    ];
    if(text) userContent.push({type:'text', text:text});
    pendingImage=null;
  } else {
    appendMsg('user', text);
    userContent=text;
  }

  messages.push({role:'user', content:userContent});

  let systemPrompt=s.system||'';
  if(s.memory) systemPrompt+='\n\n记忆信息：\n'+s.memory;

  const msgs=systemPrompt?[{role:'system',content:systemPrompt},...messages]:[...messages];

  appendTyping();

  try{
    const res=await fetch(s.apiUrl+'/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.apiKey},
      body:JSON.stringify({
        model:s.model||'claude-3-5-sonnet-20241022',
        max_tokens:4096,
        messages:msgs
      })
    });
    const data=await res.json();
    removeTyping();
    const reply=data.choices?.[0]?.message?.content||'出错了';
    const usage=data.usage;
    let tokens='';
    if(usage){
      tokens=(usage.prompt_tokens||0)+'+'+(usage.completion_tokens||0)+'='+(usage.total_tokens||0);
    }
    appendMsg('ai', reply, tokens);
    messages.push({role:'assistant', content:reply});

    if(messages.length===2){
      $('chatTitle').textContent=text.slice(0,15)||(s.aiName||'对话');
    }
  }catch(e){
    removeTyping();
    appendMsg('ai','请求出错：'+e.message);
  }
}

applyBg();
updateModelTag();
</script>
</html>
