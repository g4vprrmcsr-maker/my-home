<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#ffffff;
  --sidebar-bg:#f9f9f9;
  --text:#2d2d2d;
  --sub:#8e8e93;
  --border:#efefef;
  --input-bg:#f7f7f8;
  --accent:#6b4fbb;
  --hover:#f2f2f2;
}

html,body{
  height:100%;
  background:var(--bg);
  font-family:-apple-system,'SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
  color:var(--text);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

.app{
  width:100%;max-width:600px;
  height:100%;margin:0 auto;
  display:flex;position:relative;
  overflow:hidden;
}

/* ===== 侧边栏 ===== */
.sidebar{
  position:absolute;top:0;left:0;
  width:280px;height:100%;
  background:var(--sidebar-bg);
  border-right:0.5px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(-100%);
  transition:transform 0.3s cubic-bezier(0.25,0.1,0.25,1);
  z-index:100;
}
.sidebar.open{transform:translateX(0);}

.sidebar-header{
  padding:16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:0.5px solid var(--border);
}
.sidebar-header h2{font-size:15px;font-weight:600;}
.sidebar-close{
  width:28px;height:28px;border:none;background:transparent;
  font-size:18px;cursor:pointer;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
}
.sidebar-close:active{background:var(--hover);}

.sidebar-list{
  flex:1;overflow-y:auto;padding:8px;
  display:flex;flex-direction:column;gap:2px;
  -webkit-overflow-scrolling:touch;
}
.sidebar-list::-webkit-scrollbar{display:none;}

.sidebar-item{
  padding:10px 12px;border-radius:10px;
  font-size:13px;color:var(--text);
  cursor:pointer;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  transition:background 0.15s;
}
.sidebar-item:active,.sidebar-item.active{background:var(--hover);}

.sidebar-footer{
  padding:12px 16px;
  border-top:0.5px solid var(--border);
  display:flex;flex-direction:column;gap:8px;
}
.sidebar-footer-btn{
  padding:10px 12px;border-radius:10px;
  font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  border:none;background:transparent;
  color:var(--text);font-family:inherit;
  text-align:left;
}
.sidebar-footer-btn:active{background:var(--hover);}

.overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.3);z-index:99;
  display:none;
}
.overlay.show{display:block;}

/* ===== 主区域 ===== */
.main{
  width:100%;height:100%;
  display:flex;flex-direction:column;
}

/* 顶部栏 */
.topbar{
  height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  border-bottom:0.5px solid var(--border);
  flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-btn{
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  border:none;background:transparent;
  font-size:18px;cursor:pointer;color:var(--text);
  border-radius:8px;
}
.topbar-btn:active{background:var(--hover);}
.topbar-title{font-size:14px;font-weight:500;color:var(--sub);}

/* 聊天区 */
.chat-area{
  flex:1;overflow-y:auto;
  padding:20px 20px 10px 20px;
  display:flex;flex-direction:column;
  gap:24px;
  -webkit-overflow-scrolling:touch;
}
.chat-area::-webkit-scrollbar{display:none;}

.msg{display:flex;gap:10px;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}

.msg-avatar{
  width:28px;height:28px;
  border-radius:50%;flex-shrink:0;
  overflow:hidden;background:#ececec;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#aaa;
}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}

.msg-body{max-width:82%;display:flex;flex-direction:column;gap:3px;}
.msg.user .msg-body{align-items:flex-end;}

.msg-header{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--sub);
  padding:0 2px;
}

.msg-text{
  font-size:14.5px;line-height:1.75;
  color:var(--text);
  word-break:break-word;
  white-space:pre-wrap;
}
.msg.user .msg-text{
  background:var(--input-bg);
  padding:10px 14px;
  border-radius:18px 18px 4px 18px;
  border:0.5px solid var(--border);
}

.msg-footer{
  font-size:9.5px;color:#d0d0d0;
  padding:1px 4px 0 4px;
}

/* 打字 */
.typing-wrap{display:flex;gap:10px;align-items:flex-start;}
.typing-dots{display:flex;gap:3px;padding:8px 0;}
.typing-dots span{
  width:5px;height:5px;background:#ccc;
  border-radius:50%;animation:tb 1s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.15s;}
.typing-dots span:nth-child(3){animation-delay:0.3s;}
@keyframes tb{
  0%,60%,100%{transform:translateY(0);}
  30%{transform:translateY(-4px);}
}

/* 底部输入 */
.input-area{
  border-top:0.5px solid var(--border);
  padding:10px 14px;
  padding-bottom:max(10px, env(safe-area-inset-bottom));
  flex-shrink:0;
  display:flex;flex-direction:column;gap:6px;
}
.input-row{display:flex;align-items:flex-end;gap:8px;}
.input-box{
  flex:1;
  background:var(--input-bg);
  border:1px solid #e8e8e8;
  border-radius:18px;
  padding:10px 12px;
  display:flex;align-items:flex-end;gap:6px;
  transition:border-color 0.2s;
}
.input-box:focus-within{border-color:#d0d0d0;}
.input-box textarea{
  flex:1;border:none;background:transparent;
  font-size:14px;color:var(--text);
  resize:none;outline:none;
  max-height:120px;line-height:1.5;
  font-family:inherit;
}
.ib-btn{
  width:26px;height:26px;border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;color:#aaa;
  border-radius:50%;flex-shrink:0;
}
.ib-btn:active{background:rgba(0,0,0,0.05);}

.send-btn{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;flex-shrink:0;
}
.send-btn:active{opacity:0.7;}

.model-bar{
  display:flex;align-items:center;gap:6px;
  padding:0 4px;
}
.model-chip{
  font-size:11px;color:var(--sub);
  padding:3px 8px;
  background:#fff;border-radius:8px;
  border:0.5px solid #e8e8e8;
  cursor:pointer;
}
.model-chip:active{background:var(--hover);}

/* ===== 设置页 ===== */
.settings-page{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:var(--bg);z-index:200;
  display:none;flex-direction:column;
}
.settings-page.open{display:flex;}

.set-header{
  height:48px;display:flex;align-items:center;
  padding:0 14px;border-bottom:0.5px solid var(--border);
  justify-content:space-between;flex-shrink:0;
}
.set-header h2{font-size:15px;font-weight:600;}

.set-scroll{
  flex:1;overflow-y:auto;padding:20px 16px;
  display:flex;flex-direction:column;gap:28px;
  -webkit-overflow-scrolling:touch;
}
.set-scroll::-webkit-scrollbar{display:none;}

.set-section{display:flex;flex-direction:column;gap:8px;}
.set-title{font-size:12px;font-weight:600;color:var(--sub);padding-left:4px;}
.set-card{
  background:var(--input-bg);border-radius:12px;
  border:0.5px solid var(--border);overflow:hidden;
}
.set-item{
  padding:12px 14px;
  display:flex;flex-direction:column;gap:4px;
  border-bottom:0.5px solid var(--border);
}
.set-item:last-child{border-bottom:none;}
.set-label{font-size:11px;color:#aaa;}
.si{
  border:none;background:transparent;
  font-size:13.5px;color:var(--text);
  outline:none;font-family:inherit;padding:2px 0;width:100%;
}
.si::placeholder{color:#ccc;}
.si-ta{
  border:none;background:transparent;
  font-size:13px;color:var(--text);
  outline:none;font-family:inherit;
  resize:none;height:100px;line-height:1.6;
  padding:2px 0;width:100%;
}
.set-row{display:flex;align-items:center;gap:8px;}
.set-btn{
  padding:7px 12px;border-radius:8px;
  border:0.5px solid #e0e0e0;background:#fff;
  font-size:12px;cursor:pointer;font-family:inherit;
}
.set-btn:active{background:#f5f5f5;}

.avatar-upload{
  display:flex;align-items:center;gap:12px;
}
.avatar-circle{
  width:42px;height:42px;border-radius:50%;
  background:#ececec;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#aaa;flex-shrink:0;
}
.avatar-circle img{width:100%;height:100%;object-fit:cover;}
.avatar-upload-btn{
  font-size:12px;color:var(--accent);
  cursor:pointer;border:none;background:none;
  font-family:inherit;
}

.save-btn{
  width:100%;padding:13px;border-radius:12px;border:none;
  background:var(--accent);color:#fff;
  font-size:14px;font-weight:500;
  cursor:pointer;font-family:inherit;
  margin-bottom:20px;
}
.save-btn:active{opacity:0.8;}
</style>
</head>
<body>
<div class="app" id="app">

<!-- 遮罩 -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- 侧边栏 -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>会话</h2>
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sidebar-list" id="chatList"></div>
  <div class="sidebar-footer">
    <button class="sidebar-footer-btn" onclick="openSettings()">⚙️ 设置</button>
  </div>
</div>

<!-- 主区域 -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="topbar-btn" onclick="openSidebar()">☰</button>
      <span class="topbar-title" id="topTitle">新对话</span>
    </div>
    <button class="topbar-btn" onclick="newChat()">＋</button>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-box">
        <button class="ib-btn" onclick="pickImage()" title="图片">＋</button>
        <textarea id="inputBox" placeholder="给AI发消息..." rows="1"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
      </div>
      <button class="send-btn" onclick="sendMsg()">↑</button>
    </div>
    <div class="model-bar">
      <div class="model-chip" id="modelChip" onclick="showModelPicker()">选择模型</div>
    </div>
  </div>
</div>

<!-- 设置页 -->
<div class="settings-page" id="settingsPage">
  <div class="set-header">
    <h2>设置</h2>
    <button class="topbar-btn" onclick="closeSettings()">✕</button>
  </div>
  <div class="set-scroll">

    <div class="set-section">
      <div class="set-title">API</div>
      <div class="set-card">
        <div class="set-item">
          <div class="set-label">中转站地址</div>
          <input class="si" id="sUrl" placeholder="https://your-api.com/v1">
        </div>
        <div class="set-item">
          <div class="set-label">API Key</div>
          <input class="si" id="sKey" type="password" placeholder="sk-...">
        </div>
        <div class="set-item">
          <div class="set-label">模型</div>
          <div class="set-row">
            <select class="si" id="sModel" style="flex:1;"></select>
            <button class="set-btn" onclick="fetchModels()">拉取</button>
          </div>
        </div>
      </div>
    </div>

    <div class="set-section">
      <div class="set-title">个人</div>
      <div class="set-card">
        <div class="set-item">
          <div class="set-label">我的昵称</div>
          <input class="si" id="sNick" placeholder="你的名字">
        </div>
        <div class="set-item">
          <div class="set-label">AI昵称</div>
          <input class="si" id="sAiNick" placeholder="AI的名字">
        </div>
        <div class="set-item">
          <div class="set-label">我的头像</div>
          <div class="avatar-upload">
            <div class="avatar-circle" id="myAvatarPrev"></div>
            <button class="avatar-upload-btn" onclick="$('myAvatarFile').click()">上传图片</button>
          </div>
        </div>
        <div class="set-item">
          <div class="set-label">AI头像</div>
          <div class="avatar-upload">
            <div class="avatar-circle" id="aiAvatarPrev"></div>
            <button class="avatar-upload-btn" onclick="$('aiAvatarFile').click()">上传图片</button>
          </div>
        </div>
        <div class="set-item">
          <div class="set-label">在一起的日期</div>
          <input class="si" id="sDate" type="date">
        </div>
        <div class="set-item">
          <div class="set-label">聊天标题</div>
          <input class="si" id="sChatTitle" placeholder="显示在顶部的标题">
        </div>
      </div>
    </div>

    <div class="set-section">
      <div class="set-title">人设与记忆</div>
      <div class="set-card">
        <div class="set-item">
          <div class="set-label">系统提示词</div>
          <textarea class="si-ta" id="sSys" placeholder="AI的人设..."></textarea>
        </div>
        <div class="set-item">
          <div class="set-label">记忆</div>
          <textarea class="si-ta" id="sMem" placeholder="记忆内容..."></textarea>
        </div>
      </div>
    </div>

    <button class="save-btn" onclick="saveSettings()">保存</button>
  </div>
</div>

</div>

<input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImage(event)">
<input type="file" id="myAvatarFile" accept="image/*" style="display:none" onchange="uploadAvatar(event,'my')">
<input type="file" id="aiAvatarFile" accept="image/*" style="display:none" onchange="uploadAvatar(event,'ai')">
</body>
<script>
const $=id=>document.getElementById(id);

// ===== 数据 =====
let chats=JSON.parse(localStorage.getItem('chats')||'[]');
let currentIdx=0;
let pendingImage=null;

function getS(){try{return JSON.parse(localStorage.getItem('cfg'))||{};}catch(e){return {};}}
function setS(o){localStorage.setItem('cfg',JSON.stringify(o));}

// ===== 侧边栏 =====
function openSidebar(){$('sidebar').classList.add('open');$('overlay').classList.add('show');}
function closeSidebar(){$('sidebar').classList.remove('open');$('overlay').classList.remove('show');}

function renderChatList(){
  const list=$('chatList');
  list.innerHTML='';
  chats.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='sidebar-item'+(i===currentIdx?' active':'');
    d.textContent=c.title||'新对话';
    d.onclick=()=>{currentIdx=i;renderMessages();closeSidebar();updateTitle();};
    list.appendChild(d);
  });
}

// ===== 设置 =====
function openSettings(){closeSidebar();$('settingsPage').classList.add('open');loadForm();}
function closeSettings(){$('settingsPage').classList.remove('open');}

function loadForm(){
  const s=getS();
  $('sUrl').value=s.apiUrl||'';
  $('sKey').value=s.apiKey||'';
  $('sNick').value=s.nickname||'';
  $('sAiNick').value=s.aiName||'';
  $('sDate').value=s.startDate||'';
  $('sChatTitle').value=s.chatTitle||'';
  $('sSys').value=s.system||'';
  $('sMem').value=s.memory||'';
  loadModelSelect(s.model);
  showAvatarPrev('my',s.myAvatar);
  showAvatarPrev('ai',s.aiAvatar);
}

function saveSettings(){
  const old=getS();
  const cfg={
    apiUrl:$('sUrl').value.trim(),
    apiKey:$('sKey').value.trim(),
    model:$('sModel').value,
    models:old.models||[],
    nickname:$('sNick').value.trim(),
    aiName:$('sAiNick').value.trim(),
    myAvatar:old.myAvatar||'',
    aiAvatar:old.aiAvatar||'',
    startDate:$('sDate').value,
    chatTitle:$('sChatTitle').value.trim(),
    system:$('sSys').value.trim(),
    memory:$('sMem').value.trim()
  };
  setS(cfg);
  updateTitle();
  updateModelChip();
  closeSettings();
}

function uploadAvatar(e,type){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const s=getS();
    if(type==='my') s.myAvatar=ev.target.result;
    else s.aiAvatar=ev.target.result;
    setS(s);
    showAvatarPrev(type,ev.target.result);
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function showAvatarPrev(type,data){
  const el=type==='my'?$('myAvatarPrev'):$('aiAvatarPrev');
  if(data) el.innerHTML='<img src="'+data+'">';
  else el.innerHTML='';
}

async function fetchModels(){
  const url=$('sUrl').value.trim();
  const key=$('sKey').value.trim();
  if(!url||!key){alert('先填地址和Key');return;}
  try{
    const res=await fetch(url+'/models',{headers:{'Authorization':'Bearer '+key}});
    const data=await res.json();
    let list=data.data||data;
    if(Array.isArray(list)){
      list=list.map(m=>m.id||m).sort();
      const s=getS();s.models=list;setS(s);
      loadModelSelect(s.model);
    }
  }catch(e){alert('拉取失败：'+e.message);}
}

function loadModelSelect(current){
  const s=getS();
  const sel=$('sModel');
  sel.innerHTML='';
  const models=s.models||[];
  if(!models.length){sel.innerHTML='<option>先拉取</option>';return;}
  models.forEach(m=>{
    const o=document.createElement('option');
    o.value=m;o.textContent=m;
    if(m===current)o.selected=true;
    sel.appendChild(o);
  });
}

function showModelPicker(){
  const s=getS();
  const models=s.models||[];
  if(!models.length){alert('先去设置拉取模型');return;}
  const c=prompt('输入序号或名称：\n\n'+models.map((m,i)=>(i+1)+'. '+m).join('\n'));
  if(!c)return;
  let p=c.trim();
  const n=parseInt(p);
  if(n>0&&n<=models.length)p=models[n-1];
  if(models.includes(p)){const cfg=getS();cfg.model=p;setS(cfg);updateModelChip();}
}

function updateModelChip(){
  const s=getS();
  $('modelChip').textContent=s.model?s.model.split('/').pop():'选择模型';
}

function updateTitle(){
  const s=getS();
  if(s.chatTitle){$('topTitle').textContent=s.chatTitle;return;}
  const chat=chats[currentIdx];
  $('topTitle').textContent=chat?chat.title||'新对话':'新对话';
}

// ===== 聊天 =====
function newChat(){
  chats.push({title:'新对话',messages:[]});
  currentIdx=chats.length-1;
  saveChats();renderChatList();renderMessages();updateTitle();
}

function saveChats(){localStorage.setItem('chats',JSON.stringify(chats));}

function now(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function makeAvatar(type){
  const s=getS();
  const data=type==='ai'?s.aiAvatar:s.myAvatar;
  if(data) return '<div class="msg-avatar"><img src="'+data+'"></div>';
  const letter=type==='ai'?(s.aiName||'AI').charAt(0):(s.nickname||'我').charAt(0);
  return '<div class="msg-avatar">'+letter+'</div>';
}

function renderMessages(){
  const area=$('chatArea');
  area.innerHTML='';
  if(!chats.length){newChat();return;}
  const chat=chats[currentIdx];
  chat.messages.forEach(m=>{
    appendMsgDOM(m.role,m.text,m.tokens,m.time);
  });
  area.scrollTop=area.scrollHeight;
  renderChatList();
}

function appendMsgDOM(role,text,tokens,time){
  const s=getS();
  const area=$('chatArea');
  const div=document.createElement('div');
  div.className='msg '+(role==='user'?'user':'ai');
  const name=role==='user'?(s.nickname||'我'):(s.aiName||'AI');
  const t=time||now();
  div.innerHTML=makeAvatar(role==='user'?'user':'ai')+
    '<div class="msg-body">'+
      '<div class="msg-header"><span>'+name+'</span><span>'+t+'</span></div>'+
      '<div class="msg-text">'+escHtml(text)+'</div>'+
      (tokens?'<div class="msg-footer">'+tokens+'</div>':'')+
    '</div>';
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function appendTyping(){
  const area=$('chatArea');
  const div=document.createElement('div');
  div.className='msg ai';div.id='typingEl';
  div.innerHTML=makeAvatar('ai')+
    '<div class="msg-body"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}
function removeTyping(){const el=$('typingEl');if(el)el.remove();}

function pickImage(){$('imgInput').click();}

function handleImage(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    pendingImage={base64:ev.target.result.split(',')[1],mediaType:file.type};
    const area=$('chatArea');
    const note=document.createElement('div');
    note.style.cssText='text-align:center;font-size:11px;color:#aaa;padding:4px;';
    note.textContent='📎 图片已选择，发送时附带';
    note.id='imgNote';
    area.appendChild(note);
    area.scrollTop=area.scrollHeight;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

async function sendMsg(){
  const box=$('inputBox');
  const text=box.value.trim();
  if(!text&&!pendingImage)return;
  const s=getS();
  if(!s.apiKey||!s.apiUrl){alert('先去设置填API');return;}

  box.value='';box.style.height='auto';

  const noteEl=$('imgNote');if(noteEl)noteEl.remove();

  const chat=chats[currentIdx];
  const t=now();

  let userContent;
  if(pendingImage){
    userContent=[
      {type:'image_url',image_url:{url:'data:'+pendingImage.mediaType+';base64,'+pendingImage.base64}}
    ];
    if(text) userContent.push({type:'text',text:text});
    pendingImage=null;
  } else {
    userContent=text;
  }

  chat.messages.push({role:'user',text:text||'[图片]',time:t});
  appendMsgDOM('user',text||'[图片]',null,t);

  if(chat.messages.length===1){
    chat.title=(text||'图片对话').slice(0,20);
    renderChatList();updateTitle();
  }

  let systemPrompt=s.system||'';
  if(s.memory) systemPrompt+='\n\n记忆：\n'+s.memory;
  if(s.startDate){
    const days=Math.floor((Date.now()-new Date(s.startDate).getTime())/86400000);
    if(days>=0) systemPrompt+='\n\n今天是在一起的第'+days+'天。';
  }

  const apiMsgs=[];
  if(systemPrompt) apiMsgs.push({role:'system',content:systemPrompt});
  chat.messages.forEach(m=>{
    if(m.role==='user') apiMsgs.push({role:'user',content:m.apiContent||m.text});
    else apiMsgs.push({role:'assistant',content:m.text});
  });
  // 替换最后一条user的content为可能含图片的
  if(userContent!==text){
    apiMsgs[apiMsgs.length-1].content=userContent;
    chat.messages[chat.messages.length-1].apiContent=userContent;
  }

  appendTyping();
  saveChats();

  try{
    const res=await fetch(s.apiUrl+'/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.apiKey},
      body:JSON.stringify({model:s.model||'claude-3-5-sonnet-20241022',max_tokens:4096,messages:apiMsgs})
    });
    const data=await res.json();
    removeTyping();
    const reply=data.choices?.[0]?.message?.content||data.error?.message||'出错了';
    const usage=data.usage;
    let tokens='';
    if(usage) tokens=(usage.prompt_tokens||0)+'+'+(usage.completion_tokens||0)+'='+(usage.total_tokens||0)+' tokens';
    const rt=now();
    chat.messages.push({role:'assistant',text:reply,tokens:tokens,time:rt});
    appendMsgDOM('assistant',reply,tokens,rt);
    saveChats();
  }catch(e){
    removeTyping();
    appendMsgDOM('assistant','请求失败：'+e.message,null,now());
  }
}

// ===== 初始化 =====
if(!chats.length) newChat();
renderMessages();
updateModelChip();
updateTitle();
</script>
</html>
